<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — BicolTransit Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../index.html"><span><span class="brand-quick">BicolTransit</span>Hub</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="user/my-bookings.html">My Bookings</a></li>
        <li class="nav-item"><a class="nav-link" href="user/profile.html">Profile</a></li>
      </ul>
      <div class="ms-lg-3 mt-2 mt-lg-0 d-flex align-items-center gap-2" id="nav-auth-btns"></div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 id="dash-greeting">My Dashboard</h1>
    <p>Your travel overview at a glance</p>
  </div>
</div>

<div style="background:#f9fafb;padding:32px 0;min-height:60vh">
  <div class="container">

    <!-- Quick book -->
    <div class="card-white" style="margin-bottom:24px">
      <h5 style="font-weight:700;font-size:15px;margin-bottom:16px">🔍 Quick Book a Trip</h5>
      <div class="search-row">
        <div class="search-field">
          <label>From</label>
          <input type="text" value="Albay" disabled style="background:#f3f4f6;color:#6b7280">
        </div>
        <div class="search-field">
          <label>To</label>
          <input id="to" type="text" placeholder="e.g. Manila" list="dests">
          <datalist id="dests">
            <option value="Manila"><option value="Baguio"><option value="Batangas">
            <option value="Laguna"><option value="Quezon City"><option value="Tabaco City">
          </datalist>
        </div>
        <div class="search-field">
          <label>Date</label>
          <input id="date" type="date">
        </div>
        <button class="btn-search" onclick="searchTrip()">Search →</button>
      </div>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-card-icon">🎫</div>
        <div><h4 id="my-total">0</h4><p>Total Bookings</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">✅</div>
        <div><h4 id="my-confirmed">0</h4><p>Confirmed</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">💰</div>
        <div><h4 id="my-spent">₱0</h4><p>Total Spent</p></div>
      </div>
    </div>

    <!-- Recent bookings -->
    <div class="card-white">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h6 style="font-weight:700;margin-bottom:0">Recent Trips</h6>
        <a href="user/my-bookings.html" class="btn-sm btn-green">View All</a>
      </div>
      <div id="recent-container"></div>
    </div>

  </div>
</div>

<footer>
  <div class="container">
    <div style="text-align:center;color:rgba(255,255,255,0.35);font-size:12px">© 2026 QuickReserve. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
  if (!Auth.isLoggedIn()) { window.location.href = 'auth/login.html'; }

  const user = Auth.currentUser();
  document.getElementById('dash-greeting').textContent = `Welcome, ${user.name.split(' ')[0]}! 👋`;

  const myBookings = Bookings.forUser(user.id);
  const confirmed  = myBookings.filter(b => b.status === 'confirmed');
  const spent      = confirmed.reduce((s, b) => s + (b.price||0), 0);

  document.getElementById('my-total').textContent     = myBookings.length;
  document.getElementById('my-confirmed').textContent = confirmed.length;
  document.getElementById('my-spent').textContent     = formatPeso(spent);

  const recent = myBookings.slice(-5).reverse();
  const rc = document.getElementById('recent-container');
  if (!recent.length) {
    rc.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#9ca3af">
      <div style="font-size:40px;margin-bottom:12px">🚌</div>
      <p>No trips yet. <a href="../index.html#routes" style="color:#0f6e56;font-weight:700">Browse routes →</a></p>
    </div>`;
  } else {
    rc.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Route</th><th>Date</th><th>Seat</th><th>Fare</th><th>Status</th></tr></thead>
      <tbody>${recent.map(b => `<tr>
        <td><strong style="color:#0f6e56">${b.id}</strong></td>
        <td>${b.route}</td>
        <td>${formatDate(b.date)}</td>
        <td>Seat ${b.seat}</td>
        <td>${formatPeso(b.price)}</td>
        <td><span class="badge-${b.status}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
</script>
</body>
</html>
