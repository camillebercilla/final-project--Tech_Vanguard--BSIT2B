<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../../index.html">
      <span><span class="brand-quick">Quick</span>Reserve</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2" id="nav-auth-btns"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">✨</div>
      <h2>Create Account</h2>
      <p class="sub">Join QuickReserve and book smarter</p>
    </div>

    <div id="reg-error" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:600"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Maria Santos">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="09XX XXX XXXX">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password">
    </div>

    <button class="btn-primary-full" id="reg-btn" onclick="doRegister()">Create Account →</button>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    <p class="auth-link" style="margin-top:6px"><a href="../../index.html">← Back to Home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '../../index.html';

async function doRegister() {
  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var phone    = document.getElementById('phone').value.trim();
  var password = document.getElementById('password').value;
  var confirm  = document.getElementById('confirm').value;
  var errEl    = document.getElementById('reg-error');
  var btn      = document.getElementById('reg-btn');
  errEl.style.display = 'none';

  if (!name || !email || !phone || !password || !confirm) {
    errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
  }

  var existing = Users.all().find(function(u){ return u.email.toLowerCase() === email.toLowerCase(); });
  if (existing) {
    errEl.textContent = 'An account with this email already exists.'; errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  var today = new Date().toISOString(); // ← captures exact registration date
  var newUser = null;

  try {
    var response = await fetch('http://localhost:5000/api/users/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, phone: phone, password: password, role: 'user', joined: today })
    });
    var data = await response.json();
    if (response.ok) {
      newUser = {
        id:     data._id || data.id,
        name:   data.name,
        email:  data.email,
        phone:  data.phone || phone,
        role:   data.role || 'user',
        joined: data.joined || data.createdAt || today  // ← use server date or fallback
      };
    } else {
      errEl.textContent = data.message || 'Registration failed. Try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account →';
      return;
    }
  } catch (err) {
    // Backend unreachable — save locally with joined date
    var localUser = Users.add({ name: name, email: email, phone: phone, password: password, role: 'user', joined: today });
    newUser = { id: localUser.id, name: localUser.name, email: localUser.email, phone: localUser.phone, role: localUser.role, joined: today };
  }

  Auth.login(newUser);
  showToast('Welcome, ' + name.split(' ')[0] + '! Account created 🎉');
  setTimeout(function(){ window.location.href = '../../index.html'; }, 600);
}

document.addEventListener('keydown', function(e){ if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
