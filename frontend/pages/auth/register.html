<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../../index.html">
      <span><span class="brand-quick">Quick</span>Reserve</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2" id="nav-auth-btns"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">✨</div>
      <h2>Create Account</h2>
      <p class="sub">Join QuickReserve and book smarter</p>
    </div>

    <div id="reg-error" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:600"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Maria Santos">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="09XX XXX XXXX">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password">
    </div>

    <button class="btn-primary-full" onclick="doRegister()">Create Account →</button>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    <p class="auth-link" style="margin-top:6px"><a href="../../index.html">← Back to Home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '../../index.html';

  function doRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const errEl    = document.getElementById('reg-error');
    errEl.style.display = 'none';

    if (!name || !email || !phone || !password || !confirm) {
      errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
    }
    if (Users.byEmail(email)) {
      errEl.textContent = 'An account with this email already exists.'; errEl.style.display = 'block'; return;
    }

    const newUser = Users.add({ name, email, phone, password });
    Auth.login(newUser);
    showToast('Account created! Welcome, ' + name.split(' ')[0] + '! 🎉');
    setTimeout(() => { window.location.href = '../../index.html'; }, 600);
  }

  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
