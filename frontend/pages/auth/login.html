<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <!-- Load api.js in <head> so Auth + ApiAuth are defined BEFORE any script runs -->
  <script src="../../js/api.js"></script>
  <script src="../../js/script.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../../index.html">
      <span><span class="brand-quick">Quick</span>Reserve</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2" id="nav-auth-btns"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">🚌</div>
      <h2>Welcome back!</h2>
      <p class="sub">Sign in to your QuickReserve account</p>
    </div>

    <div id="login-error" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:600"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary-full" id="login-btn" onclick="doLogin()">Login →</button>
    <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="auth-link" style="margin-top:6px"><a href="../../index.html">← Back to Home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // If already logged in, skip the login page entirely
    if (Auth.isLoggedIn()) {
      var u = Auth.currentUser();
      window.location.replace(
        (u && u.role === 'admin')
          ? '../admin/admin-mainDashboard.html'
          : '../../index.html'
      );
      return;
    }

    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  });

  async function doLogin() {
    var email    = (document.getElementById('email').value    || '').trim();
    var password = (document.getElementById('password').value || '');
    var errEl    = document.getElementById('login-error');
    var btn      = document.getElementById('login-btn');

    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent   = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled    = true;

    try {
      var data = await ApiAuth.login(email, password);

      var user      = (data && data._resolvedUser) ? data._resolvedUser : Auth.currentUser();
      var firstName = (user && user.name) ? user.name.split(' ')[0] : 'there';
      var userRole  = (user && user.role) ? user.role : 'user';

      showToast('Welcome back, ' + firstName + '! 👋');

      setTimeout(function () {
        var redirect = null;
        try {
          redirect = localStorage.getItem('loginRedirect');
          localStorage.removeItem('loginRedirect');
        } catch (e) {}

        if (userRole === 'admin') {
          window.location.href = '../admin/admin-mainDashboard.html';
        } else if (redirect && redirect.indexOf('login') === -1) {
          window.location.href = redirect;
        } else {
          window.location.href = '../../index.html';
        }
      }, 600);

    } catch (err) {
      errEl.textContent   = err.message || 'Invalid email or password.';
      errEl.style.display = 'block';
      btn.textContent     = 'Login →';
      btn.disabled        = false;
    }
  }
</script>
</body>
</html>
