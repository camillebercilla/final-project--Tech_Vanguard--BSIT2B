<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../../index.html"><span><span class="brand-quick">Quick</span>Reserve</span></a>
    <div class="ms-auto d-flex align-items-center gap-2" id="nav-auth-btns"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:40px;margin-bottom:8px">🚌</div>
      <h2>Welcome back!</h2>
      <p class="sub">Sign in to your QuickReserve account</p>
    </div>

    <div id="login-error" style="display:none;background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:600"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div style="font-size:12px;color:#6b7280;margin-bottom:16px;background:#f9fafb;padding:10px;border-radius:8px;line-height:1.8">
      <strong>Demo accounts:</strong><br>
      👤 Admin: admin@quickreserve.com / admin123<br>
      👤 User: maria@example.com / user123
    </div>

    <button class="btn-primary-full" onclick="doLogin()">Login →</button>
    <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="auth-link" style="margin-top:6px"><a href="../../index.html">← Back to Home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (Auth.isLoggedIn()) {
      var u = Auth.currentUser();
      window.location.href = (u && u.role === 'admin')
        ? '../admin/admin-dashboard.html'
        : '../../index.html';
      return;
    }
    document.getElementById('password').addEventListener('keydown', function(e){
      if (e.key === 'Enter') doLogin();
    });
  });

  async function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errEl    = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const response = await fetch('http://localhost:5000/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok) {
        // Save session to localStorage (keeps your existing Auth system working)
        const user = { id: data._id || data.id, name: data.name, email: data.email, phone: data.phone || '', role: data.role || 'user' };
        Auth.login(user);
        showToast('Welcome back, ' + user.name.split(' ')[0] + '! 👋');

        setTimeout(function() {
          var redirect = null;
          try { redirect = localStorage.getItem('loginRedirect'); localStorage.removeItem('loginRedirect'); } catch(e){}
          if (user.role === 'admin') {
            window.location.href = '../admin/admin-dashboard.html';
          } else if (redirect && redirect.indexOf('login') === -1) {
            window.location.href = redirect;
          } else {
            window.location.href = '../../index.html';
          }
        }, 600);

      } else {
        // Fallback: try localStorage (for demo accounts that aren't in MongoDB)
        var users = Users.all();
        var localUser = null;
        for (var i = 0; i < users.length; i++) {
          if (users[i].email === email && users[i].password === password) {
            localUser = users[i]; break;
          }
        }
        if (localUser) {
          Auth.login(localUser);
          showToast('Welcome back, ' + localUser.name.split(' ')[0] + '! 👋');
          setTimeout(function() {
            window.location.href = localUser.role === 'admin' ? '../admin/admin-dashboard.html' : '../../index.html';
          }, 600);
        } else {
          errEl.textContent = data.message || 'Invalid email or password.';
          errEl.style.display = 'block';
        }
      }
    } catch (err) {
      // If backend is down, fall back to localStorage demo accounts
      var users = Users.all();
      var localUser = null;
      for (var i = 0; i < users.length; i++) {
        if (users[i].email === email && users[i].password === password) {
          localUser = users[i]; break;
        }
      }
      if (localUser) {
        Auth.login(localUser);
        showToast('Welcome back, ' + localUser.name.split(' ')[0] + '! 👋');
        setTimeout(function() {
          window.location.href = localUser.role === 'admin' ? '../admin/admin-dashboard.html' : '../../index.html';
        }, 600);
      } else {
        errEl.textContent = 'Cannot reach server. Backend may be offline.';
        errEl.style.display = 'block';
        console.error(err);
      }
    }
  }
</script>
