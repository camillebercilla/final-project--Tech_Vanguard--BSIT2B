<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings</title>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; min-height: 100vh; }

    .my-bookings-container { max-width: 780px; margin: 0 auto; padding: 32px 16px 60px; }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: #666; margin-bottom: 28px; font-size: 0.95rem; }

    /* ── Top bar ── */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .btn-back    { text-decoration: none; color: #0f6e56; font-weight: 600; font-size: 0.9rem; }
    .btn-back:hover { text-decoration: underline; }
    .btn-clear   { background: #e53e3e; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .btn-clear:hover { background: #c53030; }

    /* ── Empty state ── */
    #emptyBookings {
      text-align: center; padding: 60px 20px; color: #888;
      background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    #emptyBookings .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    #emptyBookings p { font-size: 1rem; }
    #emptyBookings a { display: inline-block; margin-top: 16px; padding: 10px 24px;
      background: #0f6e56; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 600; }

    /* ── Booking cards ── */
    #bookingsList { display: flex; flex-direction: column; gap: 20px; }

    .booking-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden; border: 1px solid #e8ecf0;
    }

    .booking-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; background: #0f6e56; color: #fff;
    }
    .booking-ref   { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px; }
    .booking-status {
      font-size: 0.78rem; font-weight: 700; padding: 3px 12px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-confirmed  { background: #d1fae5; color: #065f46; }
    .status-cancelled  { background: #fee2e2; color: #991b1b; }
    .status-pending    { background: #fef3c7; color: #92400e; }

    .booking-card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }

    .booking-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .booking-label { color: #666; min-width: 120px; }
    .booking-value { font-weight: 500; text-align: right; }
    .booking-row-total { margin-top: 6px; padding-top: 10px; border-top: 1px dashed #e0e4e8; }
    .booking-total { font-size: 1.05rem; font-weight: 700; color: #0f6e56; }

    .booking-card-footer { padding: 12px 20px; background: #f9fafb; border-top: 1px solid #eee; display: flex; justify-content: flex-end; }
    .btn-cancel-booking {
      background: transparent; color: #e53e3e; border: 1.5px solid #e53e3e;
      padding: 7px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      transition: background 0.2s;
    }
    .btn-cancel-booking:hover { background: #fee2e2; }
  </style>
</head>
<body>

<div class="my-bookings-container">
  <div class="top-bar">
    <a class="btn-back" href="../../index.html">← Back to Home</a>
    <button class="btn-clear" onclick="clearAllBookings()">Clear All Bookings</button>
  </div>

  <h1>My Bookings</h1>
  <p class="page-sub">Here are all your confirmed and past reservations.</p>

  <!-- Empty state (shown when no bookings exist) -->
  <div id="emptyBookings" style="display:none;">
    <div class="empty-icon">🎫</div>
    <p>You have no bookings yet.</p>
    <a href="../../index.html">Book a Trip Now</a>
  </div>

  <!-- Booking cards rendered here by JS -->
  <div id="bookingsList"></div>
</div>

<script src="main.js"></script>
</body>
</html>
