<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <img src="/frontend/img/rabbit.png" style="width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0;" alt="Logo">
    <a class="navbar-brand" href="../../index.html"><span><span class="brand-quick">Quick</span>Reserve</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
      </ul>
      <div class="ms-lg-3 mt-2 mt-lg-0 d-flex align-items-center gap-2" id="nav-auth-btns"></div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>My Profile</h1>
    <p>Manage your account information</p>
  </div>
</div>

<div id="page-content" style="background:#f9fafb;padding:32px 0;min-height:60vh">
  <div class="container" style="max-width:700px">

    <div class="card-white" style="text-align:center;margin-bottom:20px">
      <div class="profile-avatar" id="avatar-initials">?</div>
      <h4 id="profile-name" style="font-weight:800;margin-bottom:4px">Loading...</h4>
      <p id="profile-email" style="color:#6b7280;font-size:13px;margin-bottom:4px"></p>
      <span id="profile-role" class="badge-confirmed">User</span>
      <div style="margin-top:12px;font-size:12px;color:#9ca3af">Member since <span id="profile-joined">—</span></div>
    </div>

    <div class="card-white">
      <h5 style="font-weight:700;font-size:15px;margin-bottom:20px">✏️ Edit Profile</h5>
      <div id="edit-success" style="display:none;background:#d1fae5;color:#065f46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:600">Profile updated successfully!</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="edit-name" placeholder="Your full name">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>Email</label><input type="email" id="edit-email" placeholder="you@example.com"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="edit-phone" placeholder="09XX XXX XXXX"></div>
      </div>
      <button class="btn-primary-full" onclick="saveProfile()">Save Changes</button>
    </div>

    <div class="card-white">
      <h5 style="font-weight:700;font-size:15px;margin-bottom:20px">🔑 Change Password</h5>
      <div class="form-group"><label>Current Password</label><input type="password" id="old-pass" placeholder="••••••••"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>New Password</label><input type="password" id="new-pass" placeholder="Min 6 characters"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" id="new-pass-confirm" placeholder="Repeat new password"></div>
      </div>
      <button class="btn-primary-full" onclick="changePassword()">Update Password</button>
    </div>

    <div class="card-white" style="border:1px solid #fee2e2">
      <h5 style="font-weight:700;font-size:15px;margin-bottom:8px;color:#991b1b">⚠️ Danger Zone</h5>
      <p style="font-size:13px;color:#6b7280;margin-bottom:16px">Logging out will end your current session.</p>
      <button class="btn-sm btn-red" style="padding:10px 24px;font-size:14px" onclick="Auth.logout()">Logout</button>
    </div>

  </div>
</div>

<footer>
  <div class="container">
    <div style="text-align:center;color:rgba(255,255,255,0.35);font-size:12px">© 2026 QuickReserve. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  window.addEventListener('load', function () {
    try {
      if (typeof Auth === 'undefined') {
        document.getElementById('profile-name').textContent = 'Error: script.js not loaded';
        return;
      }
      if (!Auth.isLoggedIn()) {
        window.location.href = '../auth/login.html';
        return;
      }
      loadProfile();
    } catch(e) {
      console.error('Profile init error:', e);
      document.getElementById('profile-name').textContent = 'Error: ' + e.message;
    }
  });

  function getJoinedDate(u) {
    // Try every possible field where joined date might be stored
    var raw = u.joined || u.createdAt || u.created_at || u.registeredAt || null;

    if (raw) {
      var d = new Date(raw);
      if (!isNaN(d)) {
        return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
      }
    }

    // If still nothing, check the full Users store record (session object may be stripped)
    try {
      var dbUser = Users.byId(u.id);
      if (dbUser) {
        var dbRaw = dbUser.joined || dbUser.createdAt || dbUser.created_at || dbUser.registeredAt || null;
        if (dbRaw) {
          var d2 = new Date(dbRaw);
          if (!isNaN(d2)) {
            return d2.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
          }
        }
      }
    } catch(e) {}

    // Last resort: patch the user record with today's date so it shows next time
    try {
      var today = new Date().toISOString();
      Users.update(u.id, { joined: today });
      return new Date(today).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch(e) {}

    return 'Unknown';
  }

  function loadProfile() {
    var u = Auth.currentUser();
    if (!u) { window.location.href = '../auth/login.html'; return; }

    var initials = u.name.split(' ').map(function(n){ return n[0] || ''; }).join('').slice(0,2).toUpperCase();
    document.getElementById('avatar-initials').textContent = initials || '?';
    document.getElementById('profile-name').textContent    = u.name;
    document.getElementById('profile-email').textContent   = u.email;
    document.getElementById('profile-role').textContent    = u.role === 'admin' ? 'Admin' : 'Passenger';
    document.getElementById('profile-joined').textContent  = getJoinedDate(u);
    document.getElementById('edit-name').value  = u.name;
    document.getElementById('edit-email').value = u.email;
    document.getElementById('edit-phone').value = u.phone || '';
  }

  function saveProfile() {
    var u = Auth.currentUser();
    if (!u) return;
    var name  = document.getElementById('edit-name').value.trim();
    var email = document.getElementById('edit-email').value.trim();
    var phone = document.getElementById('edit-phone').value.trim();
    if (!name || !email) { showToast('Name and email are required.', 'error'); return; }
    Users.update(u.id, { name: name, email: email, phone: phone });
    loadProfile();
    document.getElementById('edit-success').style.display = 'block';
    setTimeout(function(){ document.getElementById('edit-success').style.display = 'none'; }, 3000);
    showToast('Profile updated!');
  }

  function changePassword() {
    var u = Auth.currentUser();
    if (!u) return;
    var oldPass = document.getElementById('old-pass').value;
    var newPass = document.getElementById('new-pass').value;
    var confirm = document.getElementById('new-pass-confirm').value;
    if (!oldPass || !newPass || !confirm) { showToast('Please fill in all password fields.', 'error'); return; }
    var dbUser = Users.byId(u.id);
    if (!dbUser || dbUser.password !== oldPass) { showToast('Current password is incorrect.', 'error'); return; }
    if (newPass.length < 6) { showToast('New password must be at least 6 characters.', 'error'); return; }
    if (newPass !== confirm) { showToast('Passwords do not match.', 'error'); return; }
    Users.update(u.id, { password: newPass });
    document.getElementById('old-pass').value = '';
    document.getElementById('new-pass').value = '';
    document.getElementById('new-pass-confirm').value = '';
    showToast('Password updated successfully!');
  }
</script>
</body>
</html>
