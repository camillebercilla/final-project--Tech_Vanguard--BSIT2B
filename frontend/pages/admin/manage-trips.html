<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Trips — QuickReserve Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><span style="color:#16c4a1">Quick</span>Reserve<br><span style="font-size:11px;font-weight:400;opacity:0.5">Admin Panel</span></div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="manage-bookings.html"><span class="sidebar-icon">🎫</span> Bookings</a>
      <a href="manage-trips.html" class="active"><span class="sidebar-icon">🚌</span> Trips</a>
      <a href="manage-users.html"><span class="sidebar-icon">👥</span> Users</a>
      <a href="../../index.html"><span class="sidebar-icon">🌐</span> View Site</a>
      <a href="#" onclick="Auth.logout()"><span class="sidebar-icon">🚪</span> Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <span style="font-weight:700">Manage Trips / Routes</span>
      <button class="btn-sm btn-green" onclick="openModal()">+ Add Trip</button>
    </div>

    <div class="admin-content">
      <div class="card-white">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Route</th><th>Duration</th><th>Fare Range</th><th>Departures</th><th>Seats</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="trips-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="trip-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:28px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto">
    <h5 id="modal-title" style="font-weight:700;margin-bottom:20px">Add Trip</h5>
    <input type="hidden" id="modal-id">
    <div class="form-group">
      <label>Route (e.g. Albay → Manila)</label>
      <input type="text" id="modal-route" placeholder="Albay → Destination">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Duration</label>
        <input type="text" id="modal-duration" placeholder="7-9 hrs">
      </div>
      <div class="form-group">
        <label>Total Seats</label>
        <input type="number" id="modal-seats" value="45" min="1" max="60">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Fare Min (₱)</label>
        <input type="number" id="modal-pmin" placeholder="1100">
      </div>
      <div class="form-group">
        <label>Fare Max (₱)</label>
        <input type="number" id="modal-pmax" placeholder="1500">
      </div>
    </div>
    <div class="form-group">
      <label>Departure Times (comma-separated)</label>
      <input type="text" id="modal-departures" placeholder="06:00, 18:00, 20:00">
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary-full" onclick="saveTrip()" style="margin-top:0">Save Trip</button>
      <button class="btn-sm btn-gray" onclick="closeModal()" style="flex:1;padding:13px">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  // Guard: if not admin, redirect to login cleanly
  if (!Auth.requireAdmin()) {
    window.location.replace('../../pages/auth/login.html');
    throw new Error('Not authorized');
  }

  function renderTable() {
    const trips = Trips.all();
    document.getElementById('trips-tbody').innerHTML = trips.map(t => `
      <tr>
        <td>${t.id}</td>
        <td><strong>${t.route}</strong></td>
        <td>${t.duration}</td>
        <td>${formatPeso(t.priceMin)} – ${formatPeso(t.priceMax)}</td>
        <td style="font-size:12px">${(t.departures||[]).join(', ')}</td>
        <td>${t.totalSeats || 45}</td>
        <td style="display:flex;gap:6px">
          <button class="btn-sm btn-yellow" onclick="openModal(${t.id})">Edit</button>
          <button class="btn-sm btn-red" onclick="deleteTrip(${t.id})">Delete</button>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:40px">No trips found</td></tr>';
  }

  function openModal(id) {
    document.getElementById('trip-modal').style.display = 'flex';
    if (id) {
      const t = Trips.byId(id);
      document.getElementById('modal-title').textContent = 'Edit Trip';
      document.getElementById('modal-id').value           = id;
      document.getElementById('modal-route').value        = t.route;
      document.getElementById('modal-duration').value     = t.duration;
      document.getElementById('modal-seats').value        = t.totalSeats || 45;
      document.getElementById('modal-pmin').value         = t.priceMin;
      document.getElementById('modal-pmax').value         = t.priceMax;
      document.getElementById('modal-departures').value   = (t.departures||[]).join(', ');
    } else {
      document.getElementById('modal-title').textContent = 'Add Trip';
      document.getElementById('modal-id').value = '';
      ['modal-route','modal-duration','modal-pmin','modal-pmax','modal-departures'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('modal-seats').value = 45;
    }
  }
  function closeModal() { document.getElementById('trip-modal').style.display = 'none'; }

  function saveTrip() {
    const id   = document.getElementById('modal-id').value;
    const data = {
      route:      document.getElementById('modal-route').value.trim(),
      duration:   document.getElementById('modal-duration').value.trim(),
      totalSeats: parseInt(document.getElementById('modal-seats').value) || 45,
      priceMin:   parseInt(document.getElementById('modal-pmin').value) || 0,
      priceMax:   parseInt(document.getElementById('modal-pmax').value) || 0,
      departures: document.getElementById('modal-departures').value.split(',').map(d => d.trim()).filter(Boolean),
    };
    if (!data.route) { showToast('Route is required.', 'error'); return; }
    if (id) { Trips.update(parseInt(id), data); showToast('Trip updated!'); }
    else    { Trips.add(data); showToast('Trip added!'); }
    closeModal(); renderTable();
  }

  function deleteTrip(id) {
    confirmAction('Delete this trip? This cannot be undone.', () => {
      Trips.delete(id);
      showToast('Trip deleted.', 'error');
      renderTable();
    });
  }

  renderTable();
</script>
</body>
</html>
