<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand"><span style="color:#16c4a1">Quick</span>Reserve<br><span style="font-size:11px;font-weight:400;opacity:0.5">Admin Panel</span></div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="active"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="manage-bookings.html"><span class="sidebar-icon">🎫</span> Bookings</a>
      <a href="manage-trips.html"><span class="sidebar-icon">🚌</span> Trips</a>
      <a href="manage-users.html"><span class="sidebar-icon">👥</span> Users</a>
      <a href="../../index.html" style="margin-top:auto"><span class="sidebar-icon">🌐</span> View Site</a>
      <a href="#" onclick="Auth.logout()"><span class="sidebar-icon">🚪</span> Logout</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <span style="font-weight:700;color:#1a1a1a">Dashboard Overview</span>
      <span id="admin-greeting" style="color:#6b7280;font-size:13px"></span>
    </div>

    <div class="admin-content">

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px">
        <div class="stat-card">
          <div class="stat-card-icon">🎫</div>
          <div><h4 id="dash-bookings">0</h4><p>Total Bookings</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">👥</div>
          <div><h4 id="dash-users">0</h4><p>Registered Users</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">🚌</div>
          <div><h4 id="dash-trips">0</h4><p>Active Routes</p></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">💰</div>
          <div><h4 id="dash-revenue">₱0</h4><p>Total Revenue</p></div>
        </div>
      </div>

      <!-- Charts row -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px">
        <div class="card-white">
          <h6 style="font-weight:700;margin-bottom:16px">Bookings by Route</h6>
          <div id="route-chart"></div>
        </div>
        <div class="card-white">
          <h6 style="font-weight:700;margin-bottom:16px">Booking Status</h6>
          <div id="status-chart"></div>
        </div>
      </div>

      <!-- Recent Bookings -->
      <div class="card-white">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h6 style="font-weight:700;margin-bottom:0">Recent Bookings</h6>
          <a href="manage-bookings.html" class="btn-sm btn-green">View All →</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Passenger</th><th>Route</th><th>Date</th><th>Seat</th><th>Fare</th><th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  // Guard: if not admin, redirect to login cleanly
  if (!Auth.requireAdmin()) {
    window.location.replace('../../pages/auth/login.html');
    throw new Error('Not authorized');
  }

  const u = Auth.currentUser();
  document.getElementById('admin-greeting').textContent = 'Welcome, ' + (u?.name || 'Admin');

  function loadDashboard() {
    const bookings = Bookings.all();
    const users    = Users.all().filter(u => u.role !== 'admin');
    const trips    = Trips.all();
    const revenue  = bookings.filter(b => b.status === 'confirmed').reduce((s,b) => s + (b.price||0), 0);

    document.getElementById('dash-bookings').textContent = bookings.length;
    document.getElementById('dash-users').textContent    = users.length;
    document.getElementById('dash-trips').textContent    = trips.length;
    document.getElementById('dash-revenue').textContent  = formatPeso(revenue);

    // Route chart
    const routeCounts = {};
    bookings.forEach(b => { routeCounts[b.route] = (routeCounts[b.route] || 0) + 1; });
    const maxCount = Math.max(...Object.values(routeCounts), 1);
    document.getElementById('route-chart').innerHTML = Object.entries(routeCounts).map(([r, c]) => `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:#374151">${r.replace('Albay \u2192 ','\u2192 ')}</span>
          <span style="font-weight:700;color:#0f6e56">${c}</span>
        </div>
        <div style="background:#f3f4f6;border-radius:20px;height:8px">
          <div style="background:#0f6e56;height:8px;border-radius:20px;width:${(c/maxCount)*100}%;transition:width 0.5s"></div>
        </div>
      </div>
    `).join('') || '<p style="color:#9ca3af;font-size:13px">No data yet</p>';

    // Status chart
    const statuses = { confirmed: 0, pending: 0, cancelled: 0 };
    bookings.forEach(b => { if (statuses[b.status] !== undefined) statuses[b.status]++; });
    const total = bookings.length || 1;
    const colors = { confirmed: '#0f6e56', pending: '#d97706', cancelled: '#dc2626' };
    document.getElementById('status-chart').innerHTML = Object.entries(statuses).map(([s, c]) => `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:#374151;text-transform:capitalize">${s}</span>
          <span style="font-weight:700;color:${colors[s]}">${c} (${Math.round(c/total*100)}%)</span>
        </div>
        <div style="background:#f3f4f6;border-radius:20px;height:8px">
          <div style="background:${colors[s]};height:8px;border-radius:20px;width:${(c/total)*100}%;transition:width 0.5s"></div>
        </div>
      </div>
    `).join('');

    // Recent bookings table
    const recent = [...bookings].sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')).slice(0, 8);
    document.getElementById('recent-tbody').innerHTML = recent.map(b => `
      <tr>
        <td><strong style="color:#0f6e56">${b.id}</strong></td>
        <td>${b.userName || b.passengerName || '—'}</td>
        <td>${b.route}</td>
        <td>${formatDate(b.date)}</td>
        <td>Seat ${b.seat}</td>
        <td>${formatPeso(b.price)}</td>
        <td><span class="badge-${b.status}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span></td>
      </tr>
    `).join('') || '<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:30px">No bookings yet</td></tr>';
  }

  loadDashboard();
</script>
</body>
</html>
