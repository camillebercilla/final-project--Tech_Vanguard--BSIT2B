<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Bookings — QuickReserve Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><span style="color:#16c4a1">Quick</span>Reserve<br><span style="font-size:11px;font-weight:400;opacity:0.5">Admin Panel</span></div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="manage-bookings.html" class="active"><span class="sidebar-icon">🎫</span> Bookings</a>
      <a href="manage-trips.html"><span class="sidebar-icon">🚌</span> Trips</a>
      <a href="manage-users.html"><span class="sidebar-icon">👥</span> Users</a>
      <a href="../../index.html"><span class="sidebar-icon">🌐</span> View Site</a>
      <a href="#" onclick="Auth.logout()"><span class="sidebar-icon">🚪</span> Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <span style="font-weight:700">Manage Bookings</span>
      <span id="count-label" style="color:#6b7280;font-size:13px"></span>
    </div>

    <div class="admin-content">

      <!-- Filters -->
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <input type="text" id="search-input" placeholder="Search by ID, passenger, route..." onkeyup="renderTable()"
          style="border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-family:Poppins,sans-serif;outline:none;width:260px">
        <select id="status-filter" onchange="renderTable()"
          style="border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-family:Poppins,sans-serif;outline:none">
          <option value="">All Statuses</option>
          <option value="confirmed">Confirmed</option>
          <option value="pending">Pending</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="card-white">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Booking ID</th><th>Passenger</th><th>Route</th><th>Date</th><th>Departure</th>
                <th>Seat</th><th>Fare</th><th>Payment</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookings-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Edit Modal -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:28px;width:400px;max-width:90vw">
    <h5 style="font-weight:700;margin-bottom:20px">Edit Booking Status</h5>
    <input type="hidden" id="modal-booking-id">
    <div class="form-group">
      <label>Booking ID</label>
      <input type="text" id="modal-bid" disabled style="background:#f3f4f6">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="modal-status" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:Poppins,sans-serif;outline:none">
        <option value="confirmed">Confirmed</option>
        <option value="pending">Pending</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary-full" onclick="saveEdit()" style="margin-top:0">Save</button>
      <button class="btn-sm btn-gray" onclick="closeModal()" style="flex:1;padding:13px">Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/script.js"></script>
<script>
  // Guard: if not admin, redirect to login cleanly
  if (!Auth.requireAdmin()) {
    window.location.replace('../../pages/auth/login.html');
    throw new Error('Not authorized');
  }

  function renderTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('status-filter').value;
    let data = Bookings.all();

    if (search) data = data.filter(b =>
      b.id.toLowerCase().includes(search) ||
      (b.userName||'').toLowerCase().includes(search) ||
      (b.passengerName||'').toLowerCase().includes(search) ||
      b.route.toLowerCase().includes(search)
    );
    if (status) data = data.filter(b => b.status === status);

    document.getElementById('count-label').textContent = data.length + ' bookings';

    const tbody = document.getElementById('bookings-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#9ca3af;padding:40px">No bookings found</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(b => `
      <tr>
        <td><strong style="color:#0f6e56">${b.id}</strong></td>
        <td>${b.userName || b.passengerName || '—'}</td>
        <td>${b.route}</td>
        <td>${formatDate(b.date)}</td>
        <td>${b.departure || '—'}</td>
        <td><strong>Seat ${b.seat}</strong></td>
        <td>${formatPeso(b.price)}</td>
        <td>${b.paymentMethod || '—'}</td>
        <td><span class="badge-${b.status}">${b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span></td>
        <td style="display:flex;gap:6px">
          <button class="btn-sm btn-yellow" onclick="openEdit('${b.id}')">Edit</button>
          <button class="btn-sm btn-red" onclick="deleteBooking('${b.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  function openEdit(id) {
    const b = Bookings.byId(id);
    document.getElementById('modal-booking-id').value = id;
    document.getElementById('modal-bid').value = id;
    document.getElementById('modal-status').value = b.status;
    document.getElementById('edit-modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
  function saveEdit() {
    const id     = document.getElementById('modal-booking-id').value;
    const status = document.getElementById('modal-status').value;
    Bookings.update(id, { status });
    closeModal();
    showToast('Booking ' + id + ' updated!');
    renderTable();
  }
  function deleteBooking(id) {
    confirmAction('Permanently delete booking ' + id + '?', () => {
      Bookings.delete(id);
      showToast('Booking deleted.', 'error');
      renderTable();
    });
  }

  renderTable();
</script>
</body>
</html>
