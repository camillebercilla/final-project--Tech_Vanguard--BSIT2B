<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seat — QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/style.css">  
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:1200px">
    <a class="navbar-brand" href="../index.html"><span><span class="brand-quick">Quick</span>Reserve</span></a>  <!-- ✅ Fixed: was ../../index.html -->
    <div class="ms-auto d-flex align-items-center gap-2" id="nav-auth-btns"></div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <a href="../index.html" style="color:rgba(255,255,255,0.7);font-size:13px;text-decoration:none">← Back</a>  <!-- ✅ Fixed: was ../../index.html -->
    </div>
    <h1 id="route-title">Albay → Manila</h1>
    <p id="trip-info">Select your departure and seat below</p>
  </div>
</div>

<div style="background:#f9fafb;padding:32px 0;min-height:60vh">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start">

      <!-- LEFT: Seat Map -->
      <div>
        <!-- Departure selector -->
        <div class="card-white" style="margin-bottom:20px">
          <h5 style="font-weight:700;font-size:14px;color:#1a1a1a;margin-bottom:12px">🕐 Select Departure Time</h5>
          <div id="departure-btns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
        </div>

        <!-- Seat Map -->
        <div class="seat-map-wrap">
          <div class="bus-front">🚌 DRIVER &nbsp; FRONT OF BUS</div>
          <div id="seat-grid" class="seat-grid"></div>
          <div class="seat-legend">
            <div class="legend-item"><div class="legend-box available"></div> Available</div>
            <div class="legend-item"><div class="legend-box selected"></div> Your Seat</div>
            <div class="legend-item"><div class="legend-box taken"></div> Taken</div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Summary -->
      <div>
        <div class="card-white" style="position:sticky;top:24px">
          <h5 style="font-weight:700;font-size:15px;color:#1a1a1a;margin-bottom:16px">📋 Trip Summary</h5>
          <div class="booking-summary">
            <div class="summary-row"><span>Route</span><span id="s-route" style="font-weight:600;text-align:right;max-width:180px">—</span></div>
            <div class="summary-row"><span>Date</span><span id="s-date">—</span></div>
            <div class="summary-row"><span>Departure</span><span id="s-depart">—</span></div>
            <div class="summary-row"><span>Duration</span><span id="s-duration">—</span></div>
            <div class="summary-row"><span>Seat</span><span id="s-seat">Not selected</span></div>
            <div class="summary-row"><span>Fare</span><span id="s-price">—</span></div>
          </div>
          <button id="proceed-btn" class="btn-primary-full" onclick="proceedToBooking()" disabled style="opacity:0.5">
            Proceed to Booking →
          </button>
          <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:10px">Select a seat to continue</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div style="text-align:center;color:rgba(255,255,255,0.35);font-size:12px">© 2026 QuickReserve. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>  <!-- ✅ Fixed: was frontend/js/script.js -->
<script>
  let selectedSeat = null;
  let selectedDeparture = null;
  const route    = QR.get('selectedRoute')    || 'Albay → Manila';
  const duration = QR.get('selectedDuration') || '7-9 hrs';
  const priceMin = QR.get('selectedPriceMin') || 1100;
  const priceMax = QR.get('selectedPriceMax') || 1500;
  const date     = QR.get('selectedDate')     || new Date().toISOString().split('T')[0];

  const ROWS = ['A','B','C','D','E','F','G','H','I'];
  const COLS = [1, 2, null, 3, 4];

  document.getElementById('route-title').textContent = route;
  document.getElementById('trip-info').textContent   = `Date: ${formatDate(date)} · Duration: ${duration}`;
  document.getElementById('s-route').textContent    = route;
  document.getElementById('s-date').textContent     = formatDate(date);
  document.getElementById('s-duration').textContent = duration;
  document.getElementById('s-price').textContent    = `₱${priceMin} – ₱${priceMax}`;

  const trips = Trips.all();
  const trip  = trips.find(t => t.route === route);
  const departures = trip ? trip.departures : ['18:00', '20:00'];

  const deptContainer = document.getElementById('departure-btns');
  departures.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-sm btn-gray';
    btn.style.padding = '8px 16px';
    btn.style.fontSize = '13px';
    btn.textContent = d;
    btn.onclick = () => selectDeparture(d, btn);
    deptContainer.appendChild(btn);
    if (i === 0) setTimeout(() => selectDeparture(d, btn), 100);
  });

  function selectDeparture(dep, btn) {
    selectedDeparture = dep;
    document.querySelectorAll('#departure-btns .btn-sm').forEach(b => {
      b.className = 'btn-sm btn-gray';
      b.style.background = '';
    });
    btn.style.background = '#0f6e56';
    btn.style.color = '#fff';
    document.getElementById('s-depart').textContent = dep;
    selectedSeat = null;
    document.getElementById('s-seat').textContent = 'Not selected';
    document.getElementById('proceed-btn').disabled = true;
    document.getElementById('proceed-btn').style.opacity = '0.5';
    renderSeats();
  }

  function renderSeats() {
    const taken = Seats.getTaken(route, date, selectedDeparture);
    const grid = document.getElementById('seat-grid');
    grid.innerHTML = '';

    ROWS.forEach(row => {
      COLS.forEach(col => {
        const el = document.createElement('div');
        if (col === null) {
          el.className = 'seat aisle';
          el.innerHTML = '&nbsp;';
        } else {
          const label = row + col;
          el.className = 'seat';
          el.textContent = label;
          if (taken.includes(label)) {
            el.classList.add('taken');
          } else {
            el.onclick = () => selectSeat(label, el);
            if (selectedSeat === label) el.classList.add('selected');
          }
        }
        grid.appendChild(el);
      });
    });
  }

  function selectSeat(label, el) {
    selectedSeat = label;
    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('s-seat').textContent = 'Seat ' + label;
    const btn = document.getElementById('proceed-btn');
    btn.disabled = false;
    btn.style.opacity = '1';
    showToast('Seat ' + label + ' selected!');
  }

  function proceedToBooking() {
    if (!selectedSeat || !selectedDeparture) {
      showToast('Please select a departure and seat first.', 'error'); return;
    }
    if (!Auth.isLoggedIn()) {
      QR.set('loginRedirect', window.location.href);
      showToast('Please login to continue.', 'warning');
      setTimeout(() => { window.location.href = 'pages/auth/login.html'; }, 1000);  // ✅ Fixed: was ../pages/auth/login.html
      return;
    }
    QR.set('selectedSeat', selectedSeat);
    QR.set('selectedDeparture', selectedDeparture);
    window.location.href = 'pages/user/booking.html';  // ✅ Already correct
  }
</script>
</body>
</html>
