<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickReserve</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 fixed-top">

  <!-- LOGO (FIXED) -->
  <a class="navbar-brand fw-bold" href="#">
    <span class="quick">Quick</span><span class="reserve">Reserve</span>
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>

  
  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Plan Your Trip</a></li>
    </ul>
  </div>

</nav>

<!-- HERO -->
<section class="hero d-flex align-items-center text-white">
  <div class="container">
    <h1 class="display-5 fw-bold">Your Journey of Exploration Begins Here!</h1>
    <p class="lead">Experience seamless travel booking with QuickReserve.</p>
  </div>
</section>

<!-- SEARCH -->
<section class="container mt-5">
  <div class="card shadow-lg p-4 rounded-4">

    <ul class="nav nav-pills mb-3">
      <li class="nav-item"><button class="nav-link active">One Way</button></li>
      <li class="nav-item"><button class="nav-link">Round Trip</button></li>
    </ul>

    <div class="row g-3">
      <div class="col-md-3"><input class="form-control" value="Los Angeles"></div>
      <div class="col-md-3"><input class="form-control" value="San Diego"></div>
      <div class="col-md-3"><input type="date" class="form-control"></div>
      <div class="col-md-2"><input type="number" class="form-control" value="1"></div>
      <div class="col-md-1"><button class="btn btn-success w-100">Search</button></div>
    </div>

  </div>
</section>

<!-- TRIPS -->
<section class="container my-5">
  <h4 class="mb-3">Available Trips</h4>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Albay → Laguna</h5>
          <p>Departure: 8:00 AM</p>
          <p>Price: $25</p>
          <button class="btn btn-outline-success btn-sm">Book Now</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Albay → Naga</h5>
          <p>Departure: 8:00 AM</p>
          <p>Price: $25</p>
          <button class="btn btn-outline-success btn-sm">Book Now</button>
        </div>
      </div>
    </div>
  </div>


</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
