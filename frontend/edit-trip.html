<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Trip — BicolTransit Hub Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><span style="color:#16c4a1">BicolTransit</span>Hub<br><span style="font-size:11px;font-weight:400;opacity:0.5">Admin Panel</span></div>
    <nav class="sidebar-nav">
      <a href="admin/admin-dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
      <a href="admin/manage-bookings.html"><span class="sidebar-icon">🎫</span> Bookings</a>
      <a href="admin/manage-trips.html" class="active"><span class="sidebar-icon">🚌</span> Trips</a>
      <a href="admin/manage-users.html"><span class="sidebar-icon">👥</span> Users</a>
      <a href="../index.html"><span class="sidebar-icon">🌐</span> View Site</a>
      <a href="#" onclick="Auth.logout()"><span class="sidebar-icon">🚪</span> Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <span style="font-weight:700">Edit Trip</span>
      <a href="admin/manage-trips.html" class="btn-sm btn-gray">← Back to Trips</a>
    </div>

    <div class="admin-content">
      <div class="card-white" style="max-width:600px">
        <h5 style="font-weight:700;font-size:15px;margin-bottom:20px">✏️ Trip Details</h5>

        <div class="form-group">
          <label>Trip ID</label>
          <input type="number" id="trip-id" placeholder="Enter trip ID to load">
        </div>
        <button class="btn-sm btn-gray" onclick="loadTrip()" style="margin-bottom:20px">Load Trip</button>

        <div id="trip-form" style="display:none">
          <div class="form-group">
            <label>Route</label>
            <input type="text" id="t-route">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label>Duration</label>
              <input type="text" id="t-duration">
            </div>
            <div class="form-group">
              <label>Total Seats</label>
              <input type="number" id="t-seats">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label>Fare Min (₱)</label>
              <input type="number" id="t-pmin">
            </div>
            <div class="form-group">
              <label>Fare Max (₱)</label>
              <input type="number" id="t-pmax">
            </div>
          </div>
          <div class="form-group">
            <label>Departure Times (comma-separated)</label>
            <input type="text" id="t-departures">
          </div>
          <button class="btn-primary-full" onclick="saveTrip()">Save Changes</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
  if (!Auth.requireAdmin()) {}

  // Check for trip ID in URL params
  const params = new URLSearchParams(window.location.search);
  const paramId = params.get('id');
  if (paramId) {
    document.getElementById('trip-id').value = paramId;
    loadTrip();
  }

  function loadTrip() {
    const id = parseInt(document.getElementById('trip-id').value);
    const t  = Trips.byId(id);
    if (!t) { showToast('Trip not found.', 'error'); return; }
    document.getElementById('t-route').value      = t.route;
    document.getElementById('t-duration').value   = t.duration;
    document.getElementById('t-seats').value      = t.totalSeats || 45;
    document.getElementById('t-pmin').value       = t.priceMin;
    document.getElementById('t-pmax').value       = t.priceMax;
    document.getElementById('t-departures').value = (t.departures||[]).join(', ');
    document.getElementById('trip-form').style.display = 'block';
  }

  function saveTrip() {
    const id   = parseInt(document.getElementById('trip-id').value);
    const data = {
      route:       document.getElementById('t-route').value.trim(),
      duration:    document.getElementById('t-duration').value.trim(),
      totalSeats:  parseInt(document.getElementById('t-seats').value) || 45,
      priceMin:    parseInt(document.getElementById('t-pmin').value) || 0,
      priceMax:    parseInt(document.getElementById('t-pmax').value) || 0,
      departures:  document.getElementById('t-departures').value.split(',').map(d => d.trim()).filter(Boolean),
    };
    if (!data.route) { showToast('Route is required.', 'error'); return; }
    Trips.update(id, data);
    showToast('Trip updated successfully!');
    setTimeout(() => { window.location.href = 'admin/manage-trips.html'; }, 1000);
  }
</script>
</body>
</html>
