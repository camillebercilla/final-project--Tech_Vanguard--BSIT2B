<!DOCTYPE html>
<html>
<head>
  <title>Trip Details</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #285A48, #3E8E7E);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
    }

    /* Header */
    .header {
      color: white;
      margin-bottom: 20px;
    }

    /* Trip Info */
    .trip-info p {
      margin: 0;
      font-size: 14px;
      color: #555;
    }

    /* Seat Styles */
    .seat {
      width: 48px;
      height: 48px;
      margin: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .seat:hover {
      transform: scale(1.1);
    }

    .available { background: #198754; color: white; }
    .occupied { background: #dc3545; color: white; cursor: not-allowed; }
    .selected { background: #ffc107; color: black; }

    /* Bus Layout */
    .seat-layout {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      justify-items: center;
      margin-top: 20px;
    }

    .aisle {
      grid-column: span 4;
      height: 10px;
    }

    /* Driver Box */
    .driver {
      background: #285A48;
      color: white;
      text-align: center;
      padding: 8px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    /* Legend */
    .legend span {
      margin-right: 10px;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: white;
    }

    .legend .available { background: #198754; }
    .legend .occupied { background: #dc3545; }
    .legend .selected { background: #ffc107; color: black; }

    .btn-custom {
      background: #285A48;
      color: white;
      border: none;
    }

    .btn-custom:hover {
      background: #1f4638;
    }

  </style>
</head>

<body class="p-4">

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Trip Details</h2>
    <p>Select your preferred seat</p>
  </div>

  <!-- TRIP INFO -->
  <div class="card shadow p-4 glass mb-4">
    <div class="row">
      <div class="col-md-4">
        <h6>Route</h6>
        <p>Manila → Quezon</p>
      </div>
      <div class="col-md-4">
        <h6>Bus Type</h6>
        <p>Deluxe</p>
      </div>
      <div class="col-md-4">
        <h6>Company</h6>
        <p>ABC Transport</p>
      </div>
    </div>
  </div>

  <!-- SEAT SELECTION -->
  <div class="card shadow p-4 glass">

    <!-- Legend -->
    <div class="legend mb-2">
      <span class="available">Available</span>
      <span class="occupied">Occupied</span>
      <span class="selected">Selected</span>
    </div>

    <!-- Driver -->
    <div class="driver">Driver</div>

    <!-- Seats -->
    <div id="seatContainer" class="seat-layout"></div>

    <!-- Button -->
    <button id="bookBtn" class="btn btn-custom w-100 mt-4">
      Proceed to Booking
    </button>

  </div>

</div>

<script src="trip-details.js"></script>
</body>
</html>
