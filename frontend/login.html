<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – QuickReserve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

  <div class="login-card">

    <!-- LOGO -->
    <div class="login-logo">
      <img src="img/rabbit.png" alt="Logo">
    </div>

    <!-- TITLE -->
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to QuickReserve</div>

    <label class="login-label">Email address</label>
    <input class="login-input" type="email" placeholder="you@example.com">

    <label class="login-label">Password</label>
    <div class="pw-wrap">
      <input class="login-input" type="password" id="password" placeholder="Enter your password">
      <span class="pw-toggle" onclick="togglePassword()">Show</span>
    </div>

    <div class="forgot">Forgot password?</div>

    <button class="login-btn">Sign in</button>

    <div class="login-divider">
      <hr><span>or</span><hr>
    </div>

    <div class="login-register">
      Don't have an account? <a href="register.html">Register now</a>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    const toggle = document.querySelector('.pw-toggle');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    toggle.textContent = pw.type === 'password' ? 'Show' : 'Hide';
  }
</script>
</body>
</html>
